<script>
document.addEventListener('DOMContentLoaded', function() {
  const EVENT = { title: "The Wedding of Tan Baksim & Try Kimly", details: "Request the honor of your presence on the auspicious occasion of the wedding reception.", locationName: "The Premier Center Sensok (Building D&E), Phnom Penh, Cambodia", startLocalISO: "2026-03-29T17:00+07:00", endLocalISO: "2026-03-29T19:00:00+07:00" };
  
  const heroVideo = document.getElementById("heroVideo"),
        heroSection = document.querySelector(".hero"),
        openBtn = document.getElementById("openBtn"),
        openingScreen = document.getElementById("openingScreen"),
        audio = document.getElementById("bgMusic"),
        navDock = document.getElementById("navDock"),
        dockBubble = document.getElementById("dockBubble"),
        navLinks = document.querySelectorAll(".dock a"),
        elDays = document.getElementById("dDays"),
        elHours = document.getElementById("dHours"),
        elMins = document.getElementById("dMins"),
        elSecs = document.getElementById("dSecs"),
        lb = document.getElementById("lightbox"),
        lbImg = document.getElementById("lbImg"),
        lbClose = document.getElementById("lbClose"),
        thumbs = Array.from(document.querySelectorAll(".thumb"));
  
  let musicStarted = false, lbCurrentIndex = 0, scrollY = 0;
  const thumbImages = thumbs.map(btn => btn.dataset.full);
  
  // === PERFECT SCROLL LOCK ===
  function lockScroll() {
    scrollY = window.pageYOffset || document.documentElement.scrollTop;
    document.body.style.position = 'fixed';
    document.body.style.top = `-${scrollY}px`;
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
  }
  
  function unlockScroll() {
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    document.body.style.overflow = '';
    document.documentElement.style.overflow = '';
    window.scrollTo(0, scrollY);
  }
  
  // === ULTRA-SMOOTH LIGHTBOX ===
  function preloadNextImage() {
    const nextIdx = (lbCurrentIndex + 1) % thumbImages.length;
    const prevIdx = (lbCurrentIndex - 1 + thumbImages.length) % thumbImages.length;
    new Image().src = thumbImages[nextIdx];
    new Image().src = thumbImages[prevIdx];
  }
  
  function openLb(index) {
    lbCurrentIndex = index;
    lbImg.src = thumbImages[index];
    lb.classList.add("is-open");
    lockScroll();
    preloadNextImage();
  }
  
  function slideToNext(direction) {
    const nextIndex = direction === 'next' ? 
      (lbCurrentIndex + 1) % thumbImages.length : 
      (lbCurrentIndex - 1 + thumbImages.length) % thumbImages.length;
    
    // Slide OUT current image
    lbImg.style.transition = 'all 0.2s ease';
    lbImg.style.opacity = '0';
    lbImg.style.transform = direction === 'next' ? 'translateX(-25%)' : 'translateX(25%)';
    
    setTimeout(() => {
      // Switch to new image
      lbCurrentIndex = nextIndex;
      lbImg.src = thumbImages[nextIndex];
    }, 100);
  }
  
  function closeLb() {
    lb.classList.remove("is-open");
    unlockScroll();
  }
  
  // === FIXED TOUCH SWIPE (CORRECT DIRECTION) ===
  let touchStartX = 0;
  
  // Touch START
  lb.addEventListener('touchstart', e => {
    if (!lb.classList.contains('is-open')) return;
    touchStartX = e.touches[0].clientX;
    lbImg.style.transition = 'none';
  }, { passive: true });
  
  // Touch MOVE (live drag)
  lb.addEventListener('touchmove', e => {
    if (!lb.classList.contains('is-open')) return;
    e.preventDefault();
    const touchCurrentX = e.touches[0].clientX;
    const diff = touchStartX - touchCurrentX;
    lbImg.style.transform = `translateX(${diff}px)`;
  }, { passive: false });
  
  // Touch END
  lb.addEventListener('touchend', e => {
    if (!lb.classList.contains('is-open')) return;
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX; // Positive = swipe LEFT
    
    if (Math.abs(diff) > 50) {
      // ✅ SWIPE LEFT (diff > 0) = NEXT IMAGE
      // ✅ SWIPE RIGHT (diff < 0) = PREVIOUS IMAGE
      slideToNext(diff > 0 ? 'next' : 'prev');
    } else {
      lbImg.style.transition = 'all 0.2s ease';
      lbImg.style.transform = 'translateX(0)';
    }
  }, { passive: false });
  
  // === FIXED CLICK ZONES (Works on IMAGE + Background) ===
  lb.addEventListener('click', function(e) {
    // Ignore close button
    if (e.target.closest('.lb-close')) return;
    
    // Get position relative to lightbox
    const rect = lb.getBoundingClientRect();
    const x = (e.clientX - rect.left) / (rect.right - rect.left);
    
    // LEFT 30% = PREV, RIGHT 30% = NEXT, MIDDLE = CLOSE
    if (x < 0.3) {
      slideToNext('prev');
    } else if (x > 0.7) {
      slideToNext('next');
    } else {
      closeLb();
    }
  });
  
  // Image loaded
  lbImg.onload = () => {
    if (lb.classList.contains("is-open")) {
      lbImg.style.transition = 'all 0.2s ease';
      lbImg.style.opacity = '1';
      lbImg.style.transform = 'translateX(0)';
      preloadNextImage();
    }
  };
  
  // Close button
  lbClose.onclick = e => { 
    e.stopPropagation(); 
    closeLb(); 
  };
  
  // Thumbnail clicks
  thumbs.forEach((btn, idx) => {
    btn.onclick = e => {
      e.preventDefault();
      openLb(idx);
    };
  });
  
  // === REST OF YOUR CODE (unchanged) ===
  function setRealViewportHeight() { 
    document.documentElement.style.setProperty("--vh", `${window.innerHeight * 0.01}px`); 
  }
  
  function startMusicOnce() { 
    if (musicStarted) return; 
    musicStarted = true; 
    audio.play().catch(() => {}); 
  }
  
  function moveBubble(targetLink) { 
    if (!targetLink || !dockBubble || !navDock) return; 
    const linkRect = targetLink.getBoundingClientRect(), 
          dockRect = navDock.getBoundingClientRect(), 
          leftPos = linkRect.left - dockRect.left; 
    dockBubble.style.width = `${linkRect.width}px`; 
    dockBubble.style.transform = `translateX(${leftPos}px)`; 
    navLinks.forEach(link => link.classList.remove("active")); 
    targetLink.classList.add("active"); 
  }
  
  function tickCountdown() { 
    const diff = new Date(EVENT.startLocalISO) - new Date(); 
    if (diff <= 0) { 
      [elDays, elHours, elMins, elSecs].forEach(el => el.textContent = "0"); 
      return; 
    } 
    const sec = Math.floor(diff / 1000); 
    elDays.textContent = Math.floor(sec / 86400); 
    elHours.textContent = String(Math.floor((sec % 86400) / 3600)).padStart(2, "0"); 
    elMins.textContent = String(Math.floor((sec % 3600) / 60)).padStart(2, "0"); 
    elSecs.textContent = String(sec % 60).padStart(2, "0"); 
  }
  
  function unlockPageScroll() { 
    document.documentElement.classList.remove("scroll-lock"); 
    document.body.classList.remove("scroll-lock"); 
    setRealViewportHeight(); 
    moveBubble(document.querySelector(".dock a.active") || document.querySelector(".dock a")); 
  }
  
  // INIT
  setRealViewportHeight(); 
  tickCountdown(); 
  moveBubble(document.querySelector(".dock a.active"));
  
  if ("IntersectionObserver" in window) {
    const sections = ["top", "event", "gallery", "location"].map(id => document.getElementById(id)).filter(Boolean);
    const scrollObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.isIntersecting && moveBubble(document.querySelector(`.dock a[href="#${entry.target.id}"]`)));
    }, { rootMargin: "-50% 0px -50% 0px", threshold: 0 });
    sections.forEach(sec => scrollObserver.observe(sec));
    
    const galleryObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => entry.isIntersecting && entry.target.classList.add("show"));
    }, { threshold: 0.15 });
    thumbs.forEach(thumb => galleryObserver.observe(thumb));
  }
  
  openBtn.onclick = () => { 
    startMusicOnce(); 
    heroVideo?.play().catch(()=>{}); 
    openingScreen.classList.add("is-leaving"); 
    heroSection.classList.add("hero-reveal");
    navDock.classList.add("is-visible"); 
  };
  
  openingScreen.ontransitionend = e => { 
    if (e.propertyName === "opacity" && openingScreen.classList.contains("is-leaving")) { 
      openingScreen.style.display = "none"; 
      unlockPageScroll(); 
    } 
  };
  
  document.addEventListener('click', e => { 
    const a = e.target.closest('a[href^="#"]'); 
    if (!a) return; 
    e.preventDefault(); 
    document.querySelector(a.getAttribute("href"))?.scrollIntoView({ behavior: "smooth", block: "start" }); 
  });
  
  setInterval(tickCountdown, 1000);
  document.getElementById("btnCalendar").onclick = () => { 
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(EVENT.title)}&dates=${new Date(EVENT.startLocalISO).toISOString().replace(/-|:|\\\\.\\\\d\\\\d\\\\d/g,"")}/${new Date(EVENT.endLocalISO).toISOString().replace(/-|:|\\\\.\\\\d\\\\d\\\\d/g,"")}&details=${encodeURIComponent(EVENT.details)}&location=${encodeURIComponent(EVENT.locationName)}`, "_blank"); 
  };
});
</script>
