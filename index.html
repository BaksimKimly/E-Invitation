<!doctype html>
<html lang="en" class="scroll-lock">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>Baksim & Kimly • Wedding Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#060606;
      --fg:#f3f3f3;
      --muted:rgba(255,255,255,.78);
      --card:rgba(0,0,0,.45);
      --border:rgba(255,255,255,.16);
      --shadow:0 14px 50px rgba(0,0,0,.58);
      --radius:18px;
      --gold-1:#6b4a1e;
      --gold-2:#f6e27a;
      --gold-3:#cfa34f;
      --gold-4:#fff1b0;
      --vh:1vh;
    }

    *{ box-sizing:border-box; }

    .scroll-lock{
      overflow:hidden !important;
      height:100svh !important;
      touch-action:none !important;
    }

    html, body{
      margin:0; padding:0;
      font-family:"Cormorant Garamond", serif;
      background:#080604 radial-gradient(circle at 50% 50%, #1c140a 0%, #060402 100%);
      color:var(--fg);
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
      width:100%;
      min-height:100svh;
    }

    .bg-wrap{
      position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px; height:100%; z-index:0; overflow:hidden;
      background:#050505; box-shadow:0 0 50px rgba(0,0,0,0.8); border-left:1px solid rgba(255,215,150,0.15); border-right:1px solid rgba(255,215,150,0.15);
    }

    .bg-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; filter:brightness(.92) contrast(1.08); opacity:1; }

    .overlay{ position:absolute; inset:0; z-index:2; background: radial-gradient(55% 45% at 50% 28%, rgba(255,220,150,.22), transparent 60%), radial-gradient(90% 80% at 50% 35%, rgba(0,0,0,.10), rgba(0,0,0,.72)); }

    #openingScreen, .hero, .section, .dock, .lightbox{ position:relative; z-index:3; }

    #fitViewport{ position:relative; width:100%; max-width:500px; min-height:100svh; display:flex; flex-direction:column; align-items:center; margin:0 auto; }

    button{ font:inherit; border:none; outline:none; background:none; cursor: pointer; }

    /* Opening Screen */
    #openingScreen{ position:fixed; inset:0; margin:0 auto; width:100%; max-width:500px; display:flex; align-items:center; justify-content:center; z-index:9999; transition:opacity .85s ease, visibility .85s ease; visibility:visible; }
    #openingScreen.is-leaving{ opacity:0; visibility:hidden; pointer-events:none; }
    .opening-glass{ position:absolute; inset:0; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); background:rgba(0,0,0,.2); }
    .open-box{ text-align:center; color:white; width:100%; max-width:440px; z-index:2; animation:openPop .9s ease both; }
    .open-sub{ font-family:"Great Vibes", cursive; font-size:clamp(24px, 6vw, 34px); background:linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-4), var(--gold-2), var(--gold-1)); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:goldShift 4s linear infinite; }

    .open-btn--lux {
      position: relative; display: inline-flex; align-items: center; justify-content: center;
      padding: 26px 60px; min-width: 250px; margin-top: 30px;
    }
    .open-btn--lux::before {
      content: ""; position: absolute; inset: 0;
      background: url("Untitled design (7).png") center/contain no-repeat;
      z-index: 0;
    }
    .open-btn__label { position: relative; z-index: 1; font-size: clamp(16px, 4vw, 20px); font-weight: 500; background:linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-4), var(--gold-2), var(--gold-1)); background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:goldShift 4s linear infinite; }

    /* Layout */
    .hero{ width:100%; min-height:calc(var(--vh) * 100); display:flex; align-items:center; justify-content:center; padding:28px 15px; opacity:0; }
    .hero.hero-reveal{ animation:heroReveal 1.1s cubic-bezier(.22,1,.36,1) forwards; }
    .section{ width:100%; display:flex; align-items:center; justify-content:center; padding: 60px 15px; }
    .content{ width:100%; max-width:440px; text-align:center; padding:30px 20px; border-radius:var(--radius); background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow); backdrop-filter:blur(12px); margin:0 auto; }

    .hero-title{ font-family:"Great Vibes", cursive; font-size:clamp(36px, 8vw, 46px); color:#fff1b0; margin-bottom:15px; }
    .parents{ display:flex; justify-content:space-between; gap:10px; width:100%; margin-bottom:20px; }
    .parent-col p{ margin:2px 0; font-size:clamp(11px, 3vw, 15px); font-weight:600; text-transform:uppercase; color:rgba(255,245,210,.95); }
    .couple-name{ font-family:"Great Vibes", cursive; font-size:clamp(24px, 7vw, 34px); color:#f6e27a; }

    /* Gallery Grid */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 100%; margin-top: 15px; }
    .thumb { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; height: 115px; cursor: pointer; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb:nth-child(1), .thumb:nth-child(7), .thumb:nth-child(10) { grid-column: span 2; height: 230px; }

    /* SEAMLESS SLIDER LIGHTBOX */
    .lightbox{ position:fixed; inset:0; background:rgba(0,0,0,.98); display:flex; align-items:center; justify-content:center; z-index:10000; opacity:0; visibility:hidden; transition:opacity .3s ease; overflow:hidden; }
    .lightbox.is-open{ opacity:1; visibility:visible; pointer-events:auto; }
    .lb-close{ position:absolute; top:30px; right:30px; width:44px; height:44px; color:#fff; cursor:pointer; z-index:10010; }

    .lb-slider {
      display: flex;
      width: 300%; /* Space for 3 images */
      height: 80vh;
      transform: translateX(-33.33%); /* Start on the middle image */
      will-change: transform;
    }
    .lb-slider img {
      width: 33.33%;
      height: 100%;
      object-fit: contain;
      padding: 0 15px;
      pointer-events: none;
    }

    /* Navigation Dock */
    .dock { 
      position: fixed; left: 50%; bottom: 25px; transform: translateX(-50%);
      display: flex; padding: 6px; border-radius: 999px; background: rgba(20, 16, 12, 0.6); 
      border: 1px solid rgba(255, 215, 150, 0.2); backdrop-filter: blur(20px); z-index: 9000; 
      width: 90%; max-width: 380px; justify-content: space-between;
      opacity: 0; visibility: hidden; transition: 0.8s ease; 
    }
    .dock.is-visible { opacity: 1; visibility: visible; }
    .dock-bubble { position: absolute; top: 6px; bottom: 6px; left: 0; background: rgba(207, 163, 79, 0.2); border: 1px solid rgba(207, 163, 79, 0.5); border-radius: 999px; z-index: 1; transition: 0.4s cubic-bezier(0.25, 1, 0.3, 1); }
    .dock a{ flex:1; text-align:center; padding:8px 4px; color:rgba(255,255,255,0.6); font-size:13px; position:relative; z-index:2; text-decoration: none; }
    .dock a.active{ color:#fff; font-weight:700; }

    @keyframes goldShift{ 0%{ background-position:0% 50%; } 100%{ background-position:200% 50%; } }
    @keyframes heroReveal{ 0%{ opacity:0; filter:blur(8px); } 100%{ opacity:1; filter:blur(0); } }
    @keyframes openPop{ from{ opacity:0; transform:translateY(15px); } to{ opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="scroll-lock">

  <div class="bg-wrap">
    <video class="bg-video" id="heroVideo" autoplay muted loop playsinline preload="auto">
      <source src="hero.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
  </div>

  <div id="openingScreen">
    <div class="opening-glass"></div>
    <div class="open-box">
      <p class="open-sub">Wedding Invitation</p>
      <div style="margin: 20px 0;"><img style="width:100%; max-width:350px;" src="logo.png" /></div>
      <button id="openBtn" type="button" class="open-btn--lux">
        <span class="open-btn__label">Open Invitation</span>
      </button>
    </div>
  </div>

  <nav class="dock" id="navDock">
    <div class="dock-bubble" id="dockBubble"></div>
    <a href="#top" class="active">Top</a>
    <a href="#event">Event</a>
    <a href="#gallery">Gallery</a>
    <a href="#location">Location</a>
  </nav>

  <div class="lightbox" id="lightbox">
    <div class="lb-close" id="lbClose">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </div>
    <div class="lb-slider" id="lbSlider">
      <img id="lbPrev" src="" alt="" />
      <img id="lbCurr" src="" alt="" />
      <img id="lbNext" src="" alt="" />
    </div>
  </div>

  <div id="fitViewport">
    <header class="hero section" id="top">
      <div class="content">
        <h1 class="hero-title">The Wedding</h1>
        <div class="parents">
          <div class="parent-col"><p>Mr. Tan Hokseng</p><p>Mrs. Chhoun Eang</p></div>
          <div class="parent-col"><p>Mr. Sam Sothy</p><p>Mrs. Ngorn Keo</p></div>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
          <h2 class="couple-name">Tan Baksim</h2>
          <img style="width:40px;" src="contentlogo.png" />
          <h2 class="couple-name">Try Kimly</h2>
        </div>
        <p style="text-transform:uppercase; font-weight:600; margin-top:20px; color:#fff1b0;">Sunday • 29 March 2026</p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top:20px;">
          <div class="cd"><b id="dDays">0</b><br><small>Days</small></div>
          <div class="cd"><b id="dHours">00</b><br><small>Hrs</small></div>
          <div class="cd"><b id="dMins">00</b><br><small>Min</small></div>
          <div class="cd"><b id="dSecs">00</b><br><small>Sec</small></div>
        </div>
      </div>
    </header>

    <section class="section" id="event">
      <div class="content"><h2 class="hero-title">Agenda</h2><img style="width:100%; border-radius:10px;" src="timeline.png" /></div>
    </section>

    <section class="section" id="gallery">
      <div class="content">
        <h2 class="hero-title">Gallery</h2>
        <div class="grid">
          <button class="thumb" data-full="01.jpg"><img src="01.jpg" /></button>
          <button class="thumb" data-full="02.jpg"><img src="02.jpg" /></button>
          <button class="thumb" data-full="03.jpg"><img src="03.jpg" /></button>
          <button class="thumb" data-full="04.jpg"><img src="04.jpg" /></button>
          <button class="thumb" data-full="05.jpg"><img src="05.jpg" /></button>
          <button class="thumb" data-full="06.jpg"><img src="06.jpg" /></button>
          <button class="thumb" data-full="07.jpg"><img src="07.jpg" /></button>
          <button class="thumb" data-full="08.jpg"><img src="08.jpg" /></button>
          <button class="thumb" data-full="09.jpg"><img src="09.jpg" /></button>
          <button class="thumb" data-full="10.jpg"><img src="10.jpg" /></button>
        </div>
      </div>
    </section>

    <section class="section" id="location">
      <div class="content"><h2 class="hero-title">Location</h2><p>The Premier Center Sensok</p><img style="width:160px; margin-top:15px;" src="qr.png" /></div>
    </section>
  </div>

  <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg" /></audio>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const EVENT_DATE = new Date("2026-03-29T17:00:00+07:00");
  const openBtn = document.getElementById("openBtn"),
        openingScreen = document.getElementById("openingScreen"),
        heroSection = document.querySelector(".hero"),
        navDock = document.getElementById("navDock"),
        dockBubble = document.getElementById("dockBubble"),
        lb = document.getElementById("lightbox"),
        slider = document.getElementById("lbSlider"),
        lbPrev = document.getElementById("lbPrev"),
        lbCurr = document.getElementById("lbCurr"),
        lbNext = document.getElementById("lbNext"),
        audio = document.getElementById("bgMusic"),
        thumbs = Array.from(document.querySelectorAll(".thumb")),
        images = thumbs.map(btn => btn.dataset.full);

  let currentIndex = 0, isSliding = false;

  // Countdown
  function updateCountdown() {
    const diff = EVENT_DATE - new Date();
    if (diff <= 0) return;
    document.getElementById("dDays").textContent = Math.floor(diff / 86400000);
    document.getElementById("dHours").textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, "0");
    document.getElementById("dMins").textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2, "0");
    document.getElementById("dSecs").textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2, "0");
  }
  setInterval(updateCountdown, 1000);

  // Seamless Slider Logic
  function updateSliderSources() {
    lbCurr.src = images[currentIndex];
    lbPrev.src = images[(currentIndex - 1 + images.length) % images.length];
    lbNext.src = images[(currentIndex + 1) % images.length];
  }

  function slide(direction) {
    if (isSliding) return;
    isSliding = true;
    
    slider.style.transition = "transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)";
    const move = direction === 'next' ? -66.66 : 0;
    slider.style.transform = `translateX(${move}%)`;

    setTimeout(() => {
      currentIndex = direction === 'next' 
        ? (currentIndex + 1) % images.length 
        : (currentIndex - 1 + images.length) % images.length;
      
      slider.style.transition = "none";
      slider.style.transform = "translateX(-33.33%)";
      updateSliderSources();
      isSliding = false;
    }, 400);
  }

  thumbs.forEach((t, i) => {
    t.onclick = () => {
      currentIndex = i;
      updateSliderSources();
      lb.classList.add("is-open");
      document.body.style.overflow = "hidden";
    };
  });

  lb.onclick = (e) => {
    if (e.target.id === "lbClose" || e.target.id === "lightbox") {
      lb.classList.remove("is-open");
      document.body.style.overflow = "";
    } else {
      slide(e.clientX > window.innerWidth / 2 ? 'next' : 'prev');
    }
  };

  // Intro
  openBtn.onclick = () => {
    audio.play().catch(() => {});
    openingScreen.classList.add("is-leaving");
    heroSection.classList.add("hero-reveal");
    navDock.classList.add("is-visible");
    document.documentElement.classList.remove("scroll-lock");
    setTimeout(() => openingScreen.style.display = "none", 850);
  };

  // Nav Sync
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        const link = document.querySelector(`.dock a[href="#${en.target.id}"]`);
        if (link) {
          const lRect = link.getBoundingClientRect(), dRect = navDock.getBoundingClientRect();
          dockBubble.style.width = `${lRect.width}px`;
          dockBubble.style.transform = `translateX(${lRect.left - dRect.left}px)`;
          document.querySelectorAll(".dock a").forEach(a => a.classList.remove("active"));
          link.classList.add("active");
        }
      }
    });
  }, { rootMargin: "-50% 0px -50% 0px" });
  document.querySelectorAll(".section").forEach(s => obs.observe(s));
});
</script>
</body>
</html>
