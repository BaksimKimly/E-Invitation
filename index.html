<!doctype html>
<html lang="en" class="scroll-lock">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>Baksim & Kimly • Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#060606;
      --fg:#f3f3f3;
      --muted:rgba(255,255,255,.78);
      --card:rgba(0,0,0,.45);
      --border:rgba(255,255,255,.16);
      --shadow:0 14px 50px rgba(0,0,0,.58);
      --radius:18px;
      --gold-1:#6b4a1e;
      --gold-2:#f6e27a;
      --gold-3:#cfa34f;
      --gold-4:#fff1b0;
      --vh:1vh;
    }

    *{ box-sizing:border-box; }

    .scroll-lock{
      overflow:hidden !important;
      height:100svh !important;
      touch-action:none !important;
    }

    html, body{
      margin:0;
      padding:0;
      font-family:"Cormorant Garamond", serif;
      background:#080604 radial-gradient(circle at 50% 50%, #1c140a 0%, #060402 100%);
      color:var(--fg);
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
      width:100%;
      min-height:100svh;
    }

    body{ position:relative; }

    .bg-wrap{
      position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px; height:100%; z-index:0; overflow:hidden;
      background:#050505; box-shadow:0 0 50px rgba(0,0,0,0.8); border-left:1px solid rgba(255,215,150,0.15); border-right:1px solid rgba(255,215,150,0.15);
    }

    .bg-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; z-index:1; filter:brightness(.92) contrast(1.08) saturate(1.12); opacity:1; transition:opacity .5s ease; }

    .fallback-bg{ position:absolute; inset:0; z-index:0; background: radial-gradient(900px 650px at 50% 26%, rgba(255,221,160,.20), transparent 60%), radial-gradient(800px 520px at 12% 86%, rgba(255,190,90,.12), transparent 58%), radial-gradient(900px 650px at 86% 88%, rgba(255,225,170,.12), transparent 58%), linear-gradient(180deg, #0b0b0b, #040404); }

    .overlay{ position:absolute; inset:0; z-index:2; background: radial-gradient(55% 45% at 50% 28%, rgba(255,220,150,.22), transparent 60%), radial-gradient(90% 80% at 50% 35%, rgba(0,0,0,.10), rgba(0,0,0,.72)); }

    #openingScreen, .hero, .section, .dock, .lightbox{ position:relative; z-index:3; }

    #fitViewport{ position:relative; width:100%; max-width:500px; min-height:100svh; display:flex; flex-direction:column; align-items:center; padding:0; z-index:3; margin:0 auto; }

    #fitRoot{ position:relative; width:100%; display:flex; flex-direction:column; align-items:center; }

    a, button{ cursor:pointer; -webkit-tap-highlight-color:transparent; }

    #openingScreen{ position:fixed; inset:0; margin:0 auto; width:100%; max-width:500px; display:flex; align-items:center; justify-content:center; z-index:9999; opacity:1; background:transparent; min-height:calc(var(--vh) * 100); padding:20px 10px; transition:opacity .85s ease, visibility .85s ease; visibility:visible; }

    #openingScreen.is-leaving{ opacity:0; visibility:hidden; pointer-events:none; }

    .opening-glass{ position:absolute; inset:0; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); background:rgba(0,0,0,.14); }

    .opening-overlay{ position:absolute; inset:0; background:radial-gradient(70% 60% at 50% 30%, rgba(255,220,150,.05), rgba(0,0,0,.26)); pointer-events:none; }

    .open-box{ text-align:center; color:white; width:100%; max-width:440px; z-index:2; animation:openPop .9s ease both; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; transition:transform .85s cubic-bezier(.22,1,.36,1), opacity .65s ease; }

    #openingScreen.is-leaving .open-box{ transform:translateY(-10px); opacity:0; }

    .open-sub{ font-family:"Great Vibes", cursive; font-size:clamp(24px, 6vw, 34px); line-height:1.2; letter-spacing:.02em; margin:0; padding:0 12px; background:linear-gradient(90deg, var(--gold-1) 0%, var(--gold-2) 18%, var(--gold-3) 35%, var(--gold-4) 50%, var(--gold-3) 65%, var(--gold-2) 82%, var(--gold-1) 100%); background-size:240% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:goldShift 4.5s ease-in-out infinite; }

    .open-logo-wrap{ position:relative; display:inline-block; width:100%; max-width:420px; line-height:0; margin:35px 0; animation:logoFloat 3.8s ease-in-out infinite; }

    .open-logo{ width:100%; height:auto; object-fit:contain; filter:drop-shadow(0 18px 40px rgba(0,0,0,.55)); animation:logoGoldGlow 4.5s ease-in-out infinite; }

    .open-btn--lux{ position:relative; display:inline-flex; align-items:center; justify-content:center; padding:12px 24px; min-width:190px; border-radius:16px; border:1px solid rgba(255,235,190,.40); background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)), linear-gradient(180deg, rgba(20,18,14,.34), rgba(8,8,8,.22)); box-shadow:0 10px 26px rgba(0,0,0,.30); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:transform .2s ease, box-shadow .2s ease; }

    .open-btn__label{ font-size:clamp(16px, 4vw, 20px); font-weight:500; background:linear-gradient(90deg, var(--gold-1) 0%, var(--gold-2) 18%, var(--gold-3) 35%, var(--gold-4) 50%, var(--gold-3) 65%, var(--gold-2) 82%, var(--gold-1) 100%); background-size:240% 100%; -webkit-background-clip:text; background-clip:text; color:transparent; animation:goldShift 4.5s ease-in-out infinite; }

    .section{ width:100%; display:flex; align-items:center; justify-content:center; padding: 60px 15px; scroll-margin-top:20px; }

    /* Layout Spacing */
    #gallery.section { padding-bottom: 90px; }
    #location.section { padding-top: 90px; padding-bottom: 90px; }
    #wishes.section { padding-top: 90px; padding-bottom: max(120px, calc(env(safe-area-inset-bottom) + 90px)); }

    .content{ width:100%; max-width:440px; text-align:center; padding:24px 15px; border-radius:var(--radius); background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); margin:0 auto; }

    .hero .content, #location .content, #wishes .content{ background:rgba(0,0,0,.20); border-color:rgba(255,255,255,.18); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); }

    #gallery .content { background: transparent !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; max-width: 100% !important; padding: 0 5px !important; }

    .thumb { border: 1px solid rgba(255, 255, 255, 0.16); border-radius: 6px; overflow: hidden; background: rgba(0, 0, 0, 0.4); transform: translateY(24px); opacity: 0; transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1); width: 100%; height: 100%; }

    .thumb.show { transform: translateY(0); opacity: 1; }

    .thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1); filter: brightness(0.9); }

    .thumb:hover img { transform: scale(1.05); filter: brightness(1.1); }

    .thumb:nth-child(1), .thumb:nth-child(7), .thumb:nth-child(10) { grid-column: span 2; grid-row: span 2; }
    .thumb:nth-child(2), .thumb:nth-child(5), .thumb:nth-child(6) { grid-column: span 1; grid-row: span 2; }

    .dock { position: fixed; left: 50%; bottom: max(15px, env(safe-area-inset-bottom)); transform: translateX(-50%); display: flex; padding: 6px; border-radius: 999px; background: rgba(20, 16, 12, 0.55); border: 1px solid rgba(255, 215, 150, 0.2); backdrop-filter: blur(20px); z-index: 9000; width: 90%; max-width: 380px; justify-content: space-between; }

    .dock-bubble { position: absolute; top: 6px; bottom: 6px; left: 0; background: linear-gradient(135deg, rgba(207, 163, 79, 0.25), rgba(207, 163, 79, 0.05)); border: 1px solid rgba(207, 163, 79, 0.5); border-radius: 999px; z-index: 1; transition: all 0.45s cubic-bezier(0.25, 1, 0.3, 1); pointer-events: none; }

    .dock a{ flex:1; text-align:center; padding:8px 4px; border-radius:999px; color:rgba(255,255,255,0.65); font-size:13px; position:relative; z-index:2; transition:color 0.3s ease; }

    .dock a.active{ color:#ffffff; font-weight:700; }

    .lightbox{ position:fixed; inset:0; background:rgba(0,0,0,.95); display:flex; align-items:center; justify-content:center; z-index:10000; opacity:0; visibility:hidden; pointer-events:none; transition:opacity .35s ease, visibility .35s ease; }

    .lightbox.is-open{ opacity:1; visibility:visible; pointer-events:auto; }

    .lb-close{ position:absolute; top:25px; right:25px; width:44px; height:44px; border-radius:50%; background:rgba(20,16,12,0.6); border:1px solid rgba(255,255,255,0.4); color:#ffffff; display:flex; align-items:center; justify-content:center; z-index:10; }

    .lightbox img{ width:100%; max-width:500px; max-height:85vh; object-fit:contain; opacity:0; will-change: transform, opacity; transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

    .hero-title{ font-family:"Great Vibes", cursive; font-size:clamp(33px, 7.5vw, 45px); color:rgba(255,245,210,.92); }
    .couple-name{ font-family:"Great Vibes", cursive; font-size:clamp(21px, 7.5vw, 37px); color:transparent; background:linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-4), var(--gold-1)); background-size:240% 100%; -webkit-background-clip:text; animation:goldShift 4.5s infinite; }

    @keyframes goldShift{ 0%{ background-position:0% 50%; } 100%{ background-position:200% 50%; } }
    @keyframes openPop{ from{ opacity:0; transform:translateY(16px); } to{ opacity:1; transform:translateY(0); } }
    @keyframes logoGoldGlow{ 0%,100%{ filter:drop-shadow(0 18px 40px rgba(0,0,0,.55)); } 50%{ filter:drop-shadow(0 18px 40px rgba(207,163,79,0.2)); } }
  </style>
</head>
<body class="scroll-lock">

  <div class="bg-wrap" aria-hidden="true">
    <div class="fallback-bg"></div>
    <video class="bg-video" id="heroVideo" autoplay muted loop playsinline preload="auto">
      <source src="hero.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
  </div>

  <div id="openingScreen">
    <div class="opening-glass"></div>
    <div class="opening-overlay"></div>
    <div class="open-box">
      <p class="open-sub">Wedding Invitation</p>
      <div class="open-logo-wrap"><img class="open-logo" src="logo.png" alt="Logo" /></div>
      <button id="openBtn" class="open-btn--lux"><span class="open-btn__label">Open Invitation</span></button>
    </div>
  </div>

  <nav class="dock" id="navDock">
    <div class="dock-bubble" id="dockBubble"></div>
    <a href="#top" class="active">Top</a>
    <a href="#event">Event</a>
    <a href="#gallery">Gallery</a>
    <a href="#location">Location</a>
  </nav>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <img id="lbImg" alt="Wedding Photo" />
  </div>

  <div id="fitViewport">
    <header class="hero section" id="top">
      <div class="content">
        <h1 class="hero-title">The Wedding</h1>
        <div class="couple-wrap">
          <div class="couple-side"><p>Groom</p><h2 class="couple-name">Tan Baksim</h2></div>
          <img style="width:45px" src="contentlogo.png" alt="monogram" />
          <div class="couple-side"><p>Bride</p><h2 class="couple-name">Try Kimly</h2></div>
        </div>
        <p>Sunday • 29 March 2026</p>
        <div class="countdown" style="display:flex; gap:10px; margin-top:20px; justify-content:center;">
          <div class="cd"><b id="dDays">0</b><span>Days</span></div>
          <div class="cd"><b id="dHours">00</b><span>Hrs</span></div>
          <div class="cd"><b id="dMins">00</b><span>Min</span></div>
        </div>
      </div>
    </header>

    <section class="section" id="event">
      <div class="content"><h2 class="section-title">Event Agenda</h2><img style="width:100%" src="timeline.png" alt="Timeline" /></div>
    </section>

    <section class="section" id="gallery">
      <div class="content">
        <h2 class="section-title">Photo Gallery</h2>
        <div class="grid" id="galleryGrid" style="display:grid; grid-template-columns:repeat(2,1fr); gap:6px;">
          <button class="thumb" data-full="01.jpg"><img src="01.jpg" alt="1"></button>
          <button class="thumb" data-full="02.jpg"><img src="02.jpg" alt="2"></button>
          <button class="thumb" data-full="03.jpg"><img src="03.jpg" alt="3"></button>
          <button class="thumb" data-full="04.jpg"><img src="04.jpg" alt="4"></button>
          <button class="thumb" data-full="05.jpg"><img src="05.jpg" alt="5"></button>
          <button class="thumb" data-full="06.jpg"><img src="06.jpg" alt="6"></button>
          <button class="thumb" data-full="07.jpg"><img src="07.jpg" alt="7"></button>
          <button class="thumb" data-full="08.jpg"><img src="08.jpg" alt="8"></button>
          <button class="thumb" data-full="09.jpg"><img src="09.jpg" alt="9"></button>
          <button class="thumb" data-full="10.jpg"><img src="10.jpg" alt="10"></button>
        </div>
      </div>
    </section>

    <section class="section" id="location">
      <div class="content">
        <h2 class="section-title">Location</h2>
        <p>The Premier Center Sensok</p>
        <div class="qrbox" style="margin:20px auto; width:150px;"><img style="width:100%" src="qr.png" alt="QR" /></div>
      </div>
    </section>

    <section class="section" id="wishes">
      <div class="content"><h2>Thank You</h2><a class="btn" href="#top">Back to Top</a></div>
    </section>
  </div>

  <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg" /></audio>

  <script>
    const audio = document.getElementById("bgMusic"), opening = document.getElementById("openingScreen"), lb = document.getElementById("lightbox"), lbImg = document.getElementById("lbImg");
    const thumbs = Array.from(document.querySelectorAll(".thumb")), images = thumbs.map(t => t.dataset.full);
    let currentIndex = 0, isAnimating = false;

    // Viewport & Bubble Logic
    function moveBubble(el) {
      if(!el) return;
      const dock = document.getElementById("navDock").getBoundingClientRect(), rect = el.getBoundingClientRect();
      const bubble = document.getElementById("dockBubble");
      bubble.style.width = rect.width + "px";
      bubble.style.transform = `translateX(${rect.left - dock.left}px)`;
      document.querySelectorAll(".dock a").forEach(a => a.classList.remove("active"));
      el.classList.add("active");
    }

    // Lightbox Logic
    function openLb(index) {
      currentIndex = index;
      lbImg.style.transition = "none";
      lbImg.style.opacity = "0";
      lbImg.style.transform = "scale(0.9)";
      lbImg.src = images[currentIndex];
      lb.classList.add("is-open");
      document.body.style.overflow = "hidden";
    }

    function changeImg(dir) {
      if(isAnimating) return;
      isAnimating = true;
      // Fade out and Scale UP
      lbImg.style.opacity = "0";
      lbImg.style.transform = "scale(1.1)";
      
      setTimeout(() => {
        currentIndex = dir === 'next' ? (currentIndex + 1) % images.length : (currentIndex - 1 + images.length) % images.length;
        lbImg.style.transition = "none";
        lbImg.style.transform = "scale(0.9)"; // Start small for next image
        lbImg.src = images[currentIndex];
      }, 300);
    }

    lbImg.onload = () => {
      requestAnimationFrame(() => {
        lbImg.style.transition = "opacity 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
        lbImg.style.opacity = "1";
        lbImg.style.transform = "scale(1)";
        setTimeout(() => isAnimating = false, 400);
      });
    };

    // Click navigation (Left/Right zones)
    lb.addEventListener("click", (e) => {
      const x = e.clientX, width = window.innerWidth;
      if (e.target === document.getElementById("lbClose") || e.target.closest("#lbClose")) {
        lb.classList.remove("is-open");
        document.body.style.overflow = "";
      } else if (x < width * 0.3) {
        changeImg('prev');
      } else if (x > width * 0.7) {
        changeImg('next');
      } else if (e.target === lb) {
        lb.classList.remove("is-open");
        document.body.style.overflow = "";
      }
    });

    // Swiping
    let startX = 0;
    lb.addEventListener("touchstart", e => startX = e.touches[0].clientX, {passive:true});
    lb.addEventListener("touchend", e => {
      const diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 50) changeImg(diff > 0 ? 'next' : 'prev');
    }, {passive:true});
    lb.addEventListener("touchmove", e => e.preventDefault(), {passive:false});

    // Init
    document.getElementById("openBtn").onclick = () => {
      audio.play(); opening.classList.add("is-leaving");
      document.body.classList.remove("scroll-lock");
      setTimeout(() => opening.style.display = "none", 850);
    };

    thumbs.forEach((t, i) => t.onclick = () => openLb(i));

    const obs = new IntersectionObserver((entries) => {
      entries.forEach(en => { if(en.isIntersecting) moveBubble(document.querySelector(`.dock a[href="#${en.target.id}"]`)); });
    }, { rootMargin: "-50% 0px -50% 0px" });
    ["top", "event", "gallery", "location"].forEach(id => obs.observe(document.getElementById(id)));

    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(en => { if(en.isIntersecting) en.target.classList.add("show"); });
    }, { threshold: 0.1 });
    thumbs.forEach(t => revealObs.observe(t));

    setInterval(() => {
      const d = new Date("2026-03-29T17:00:00") - new Date();
      if(d > 0) {
        document.getElementById("dDays").innerText = Math.floor(d/86400000);
        document.getElementById("dHours").innerText = String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
        document.getElementById("dMins").innerText = String(Math.floor((d%3600000)/60000)).padStart(2,'0');
      }
    }, 1000);
  </script>
</body>
</html>
