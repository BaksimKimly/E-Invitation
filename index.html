<!doctype html>
<html lang="en" class="scroll-lock">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>Baksim & Kimly • Wedding Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#060606;
      --fg:#f3f3f3;
      --muted:rgba(255,255,255,.78);
      --card:rgba(0,0,0,.45);
      --border:rgba(255,255,255,.16);
      --shadow:0 14px 50px rgba(0,0,0,.58);
      --radius:18px;
      --gold-1:#6b4a1e;
      --gold-2:#f6e27a;
      --gold-3:#cfa34f;
      --gold-4:#fff1b0;
      --vh:1vh;
    }

    *{ box-sizing:border-box; }

    .scroll-lock{
      overflow:hidden !important;
      height:100svh !important;
      touch-action:none !important;
    }

    html, body{
      margin:0;
      padding:0;
      font-family:"Cormorant Garamond", serif;
      background:#080604 radial-gradient(circle at 50% 50%, #1c140a 0%, #060402 100%);
      color:var(--fg);
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
      width:100%;
      min-height:100svh;
    }

    /* Fixed Background */
    .bg-wrap{
      position:fixed; top:0; left:50%; transform:translateX(-50%); width:100%; max-width:500px; height:100%; z-index:0; overflow:hidden;
      background:#050505; box-shadow:0 0 50px rgba(0,0,0,0.8); border-left:1px solid rgba(255,215,150,0.15); border-right:1px solid rgba(255,215,150,0.15);
    }
    .bg-video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; filter:brightness(.92) contrast(1.08); }
    .overlay{ position:absolute; inset:0; z-index:2; background: radial-gradient(55% 45% at 50% 28%, rgba(255,220,150,.22), transparent 60%), radial-gradient(90% 80% at 50% 35%, rgba(0,0,0,.10), rgba(0,0,0,.72)); }

    /* Opening Screen */
    #openingScreen{ position:fixed; inset:0; margin:0 auto; width:100%; max-width:500px; display:flex; align-items:center; justify-content:center; z-index:9999; transition:opacity .85s ease, visibility .85s ease; visibility:visible; }
    #openingScreen.is-leaving{ opacity:0; visibility:hidden; pointer-events:none; }
    .opening-glass{ position:absolute; inset:0; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); background:rgba(0,0,0,.14); }
    .open-box{ text-align:center; color:white; width:100%; max-width:440px; z-index:2; display:flex; flex-direction:column; align-items:center; transition:transform .85s cubic-bezier(.22,1,.36,1), opacity .65s ease; }
    .open-logo{ width:100%; max-width:420px; height:auto; filter:drop-shadow(0 18px 40px rgba(0,0,0,.55)); animation:logoFloat 3.8s ease-in-out infinite; }

    /* Designer Frame Button - Adjusted Width to Fit Perfectly */
    .open-btn-container {
      position: relative;
      width: 360px; /* Widened to fit the PNG scrolls around the text */
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-top: 20px;
      background: none;
      border: none;
    }
    .open-btn-frame {
      position: absolute;
      inset: 0;
      -webkit-mask: url('Untitled design (7).png') no-repeat center / contain;
      mask: url('Untitled design (7).png') no-repeat center / contain;
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-4), var(--gold-2), var(--gold-1));
      background-size: 200% 100%;
      animation: goldShift 4s linear infinite;
      pointer-events: none;
    }
    .open-btn__label{
      font-size: 22px;
      font-weight: 500;
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2), var(--gold-4), var(--gold-2), var(--gold-1));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: goldShift 4s linear infinite;
      text-shadow: 0 0 10px rgba(255,220,150,0.1);
    }

    /* Sections */
    .section{ width:100%; display:flex; align-items:center; justify-content:center; padding: 60px 15px; position:relative; z-index:3; scroll-margin-top:20px; }
    #gallery.section { padding-bottom: 90px; }
    #location.section { padding-top: 90px; padding-bottom: 90px; }
    #wishes.section { padding-top: 90px; padding-bottom: 140px; }

    .content{ width:100%; max-width:440px; text-align:center; padding:24px 15px; border-radius:var(--radius); background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow); backdrop-filter:blur(12px); margin:0 auto; }
    #gallery .content { background: transparent !important; border: none !important; box-shadow: none !important; backdrop-filter: none !important; max-width: 100% !important; padding: 0 5px !important; }

    /* Gallery Grid */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 100%; }
    .thumb { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: rgba(0,0,0,0.4); cursor: pointer; transition: all 0.4s ease; height: 115px; width: 100%; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); }
    .thumb:nth-child(1), .thumb:nth-child(7), .thumb:nth-child(10) { grid-column: span 2; grid-row: span 2; height: 236px; }

    /* Dock */
    .dock { position: fixed; left: 50%; bottom: 25px; transform: translateX(-50%); display: flex; padding: 6px; border-radius: 999px; background: rgba(20, 16, 12, 0.6); border: 1px solid rgba(255, 215, 150, 0.2); backdrop-filter: blur(20px); z-index: 9000; width: 90%; max-width: 380px; justify-content: space-between; }
    .dock-bubble { position: absolute; top: 6px; bottom: 6px; left: 0; background: linear-gradient(135deg, rgba(207, 163, 79, 0.25), rgba(207, 163, 79, 0.05)); border: 1px solid rgba(207, 163, 79, 0.5); border-radius: 999px; z-index: 1; transition: all 0.45s cubic-bezier(0.25, 1, 0.3, 1); pointer-events: none; }
    .dock a{ flex:1; text-align:center; padding:8px 4px; border-radius:999px; color:rgba(255,255,255,0.6); font-size:13px; position:relative; z-index:2; transition:color 0.3s ease; }
    .dock a.active{ color:#ffffff; font-weight:700; }

    /* Lightbox Slide Logic */
    .lightbox{ position:fixed; inset:0; background:rgba(0,0,0,.96); display:flex; align-items:center; justify-content:center; z-index:10000; opacity:0; visibility:hidden; pointer-events:none; transition:opacity .35s ease; }
    .lightbox.is-open{ opacity:1; visibility:visible; pointer-events:auto; }
    .lb-close{ position:absolute; top:25px; right:25px; width:44px; height:44px; border-radius:50%; background:rgba(20,16,12,0.6); border:1px solid rgba(255,255,255,0.4); color:#fff; display:flex; align-items:center; justify-content:center; z-index:11; cursor:pointer; }
    .lightbox img{ width:100%; max-width:500px; max-height:88vh; object-fit:contain; will-change: transform; transition: transform 0.4s cubic-bezier(0.25, 1, 0.3, 1); transform: translateX(0); }

    /* UI Animation */
    @keyframes goldShift{ 0%{ background-position:0% 50%; } 100%{ background-position:200% 50%; } }
    @keyframes logoFloat{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
    @keyframes heroReveal{ 0%{ opacity:0; filter:blur(8px); } 100%{ opacity:1; filter:blur(0); } }
  </style>
</head>
<body class="scroll-lock">

  <div class="bg-wrap">
    <video class="bg-video" id="heroVideo" autoplay muted loop playsinline preload="auto">
      <source src="hero.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
  </div>

  <div id="openingScreen">
    <div class="opening-glass"></div>
    <div class="open-box">
      <p style="font-family:'Great Vibes'; font-size: 24px;">Wedding Invitation</p>
      <div style="margin: 30px 0;"><img class="open-logo" src="logo.png" alt="Logo" /></div>
      
      <button id="openBtn" class="open-btn-container">
        <div class="open-btn-frame"></div>
        <span class="open-btn__label">Open Invitation</span>
      </button>
    </div>
  </div>

  <nav class="dock" id="navDock">
    <div class="dock-bubble" id="dockBubble"></div>
    <a href="#top" class="active">Top</a>
    <a href="#event">Event</a>
    <a href="#gallery">Gallery</a>
    <a href="#location">Location</a>
  </nav>

  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
    <img id="lbImg" alt="Gallery Photo" />
  </div>

  <div id="fitViewport">
    <header class="hero section" id="top">
      <div class="content">
        <h1 style="font-family:'Great Vibes'; font-size:42px; margin-bottom:15px; color:#fff1b0;">The Wedding</h1>
        <div style="display:flex; align-items:center; justify-content:center; gap:12px; margin:20px 0;">
          <div style="flex:1"><p style="font-size:11px; letter-spacing:2px;">GROOM</p><h2 style="font-family:'Great Vibes'; color:#f6e27a;">Tan Baksim</h2></div>
          <img style="width:40px;" src="contentlogo.png" alt="monogram" />
          <div style="flex:1"><p style="font-size:11px; letter-spacing:2px;">BRIDE</p><h2 style="font-family:'Great Vibes'; color:#f6e27a;">Try Kimly</h2></div>
        </div>
        <p style="text-transform:uppercase; font-weight:600; letter-spacing:1px; margin-top:15px;">Sunday • 29 March 2026 • 5:00 PM</p>
        <div style="display:flex; gap:15px; justify-content:center; margin-top:25px;">
          <div style="flex:1;"><b id="dDays" style="font-size:28px; display:block;">0</b><span style="font-size:11px; color:var(--muted);">Days</span></div>
          <div style="flex:1;"><b id="dHours" style="font-size:28px; display:block;">00</b><span style="font-size:11px; color:var(--muted);">Hrs</span></div>
          <div style="flex:1;"><b id="dMins" style="font-size:28px; display:block;">00</b><span style="font-size:11px; color:var(--muted);">Min</span></div>
        </div>
      </div>
    </header>

    <section class="section" id="event">
      <div class="content"><h2 style="font-family:'Great Vibes'; font-size:34px; margin-bottom:15px;">Event Agenda</h2><img style="width:100%; border-radius:10px;" src="timeline.png" alt="Timeline" /></div>
    </section>

    <section class="section" id="gallery">
      <div class="content">
        <h2 style="font-family:'Great Vibes'; font-size:34px; margin-bottom:15px;">Photo Gallery</h2>
        <div class="grid">
          <button class="thumb" data-full="01.jpg"><img src="01.jpg" alt="1"></button>
          <button class="thumb" data-full="02.jpg"><img src="02.jpg" alt="2"></button>
          <button class="thumb" data-full="03.jpg"><img src="03.jpg" alt="3"></button>
          <button class="thumb" data-full="04.jpg"><img src="04.jpg" alt="4"></button>
          <button class="thumb" data-full="05.jpg"><img src="05.jpg" alt="5"></button>
          <button class="thumb" data-full="06.jpg"><img src="06.jpg" alt="6"></button>
          <button class="thumb" data-full="07.jpg"><img src="07.jpg" alt="7"></button>
          <button class="thumb" data-full="08.jpg"><img src="08.jpg" alt="8"></button>
          <button class="thumb" data-full="09.jpg"><img src="09.jpg" alt="9"></button>
          <button class="thumb" data-full="10.jpg"><img src="10.jpg" alt="10"></button>
        </div>
      </div>
    </section>

    <section class="section" id="location">
      <div class="content">
        <h2 style="font-family:'Great Vibes'; font-size:34px; margin-bottom:10px;">Location</h2>
        <p>The Premier Center Sensok (Building D&E)</p>
        <div style="margin:20px auto; width:160px; height:160px; border:1px solid rgba(255,215,150,0.3); border-radius:12px; padding:10px;"><img style="width:100%; height:100%; object-fit:contain;" src="qr.png" alt="QR" /></div>
      </div>
    </section>

    <section class="section" id="wishes">
      <div class="content"><h2>Thank You</h2><a style="display:inline-block; margin-top:20px; padding:10px 24px; border:1px solid var(--border); border-radius:10px;" href="#top">Back to Top</a></div>
    </section>
  </div>

  <audio id="bgMusic" loop preload="auto"><source src="music.mp3" type="audio/mpeg"></audio>

  <script>
    const audio = document.getElementById("bgMusic"), opening = document.getElementById("openingScreen"), lb = document.getElementById("lightbox"), lbImg = document.getElementById("lbImg");
    const thumbs = Array.from(document.querySelectorAll(".thumb")), images = thumbs.map(t => t.dataset.full);
    let currentIndex = 0, isAnimating = false;

    // Navigation Bubble Logic
    function moveBubble(el) {
      if(!el) return;
      const dock = document.getElementById("navDock").getBoundingClientRect(), rect = el.getBoundingClientRect();
      const bubble = document.getElementById("dockBubble");
      bubble.style.width = rect.width + "px";
      bubble.style.transform = `translateX(${rect.left - dock.left}px)`;
      document.querySelectorAll(".dock a").forEach(a => a.classList.remove("active"));
      el.classList.add("active");
    }

    // Lightbox Slide Transition Logic
    function openLb(index) {
      currentIndex = index;
      lbImg.style.transition = "none";
      lbImg.style.transform = "translateX(0)";
      lbImg.src = images[currentIndex];
      lb.classList.add("is-open");
      document.body.style.overflow = "hidden";
      document.documentElement.classList.add("scroll-lock");
    }

    function changeImg(dir) {
      if(isAnimating) return;
      isAnimating = true;
      const width = window.innerWidth;
      const outX = dir === 'next' ? `-${width}px` : `${width}px`;
      const inX = dir === 'next' ? `${width}px` : `-${width}px`;
      lbImg.style.transition = "transform 0.4s cubic-bezier(0.25, 1, 0.3, 1)";
      lbImg.style.transform = `translateX(${outX})`;
      setTimeout(() => {
        currentIndex = dir === 'next' ? (currentIndex + 1) % images.length : (currentIndex - 1 + images.length) % images.length;
        lbImg.style.transition = "none";
        lbImg.style.transform = `translateX(${inX})`;
        lbImg.src = images[currentIndex];
      }, 400);
    }

    lbImg.onload = () => {
      if(!lb.classList.contains("is-open") || !isAnimating) return;
      requestAnimationFrame(() => {
        lbImg.style.transition = "transform 0.45s cubic-bezier(0.16, 1, 0.3, 1)";
        lbImg.style.transform = "translateX(0)";
        setTimeout(() => isAnimating = false, 450);
      });
    };

    lb.onclick = (e) => {
      const x = e.clientX, width = window.innerWidth;
      if(e.target.closest("#lbClose") || e.target === lb) {
        lb.classList.remove("is-open");
        document.body.style.overflow = "";
        document.documentElement.classList.remove("scroll-lock");
      } else if (x < width * 0.3) changeImg('prev');
      else if (x > width * 0.7) changeImg('next');
    };

    // Swipe Support
    let startX = 0;
    lb.addEventListener("touchstart", e => startX = e.touches[0].clientX, {passive:true});
    lb.addEventListener("touchend", e => {
      const diff = startX - e.changedTouches[0].clientX;
      if(Math.abs(diff) > 50) changeImg(diff > 0 ? 'next' : 'prev');
    }, {passive:true});

    // Opening Button
    document.getElementById("openBtn").onclick = () => {
      audio.play().catch(()=>{}); opening.classList.add("is-leaving");
      document.body.classList.remove("scroll-lock");
      document.documentElement.classList.remove("scroll-lock");
      if(document.getElementById("heroVideo")) document.getElementById("heroVideo").play();
      setTimeout(() => opening.style.display = "none", 850);
    };

    thumbs.forEach((t, i) => t.onclick = () => openLb(i));

    // Intersection Observer for Navigation Bubble
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(en => { if(en.isIntersecting) moveBubble(document.querySelector(`.dock a[href="#${en.target.id}"]`)); });
    }, { rootMargin: "-50% 0px -50% 0px" });
    ["top", "event", "gallery", "location"].forEach(id => obs.observe(document.getElementById(id)));

    // Countdown Logic
    setInterval(() => {
      const d = new Date("2026-03-29T17:00:00") - new Date();
      if(d > 0) {
        document.getElementById("dDays").innerText = Math.floor(d/86400000);
        document.getElementById("dHours").innerText = String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
        document.getElementById("dMins").innerText = String(Math.floor((d%3600000)/60000)).padStart(2,'0');
      }
    }, 1000);

    window.onresize = () => moveBubble(document.querySelector(".dock a.active"));
  </script>
</body>
</html>
