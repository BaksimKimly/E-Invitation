<script>
document.addEventListener('DOMContentLoaded', function() {

const EVENT = {
  title: "The Wedding of Tan Baksim & Try Kimly",
  details: "Request the honor of your presence on the auspicious occasion of the wedding reception.",
  locationName: "The Premier Center Sensok (Building D&E), Phnom Penh, Cambodia",
  startLocalISO: "2026-03-29T17:00+07:00",
  endLocalISO: "2026-03-29T19:00+07:00"
};

const heroVideo = document.getElementById("heroVideo"),
heroSection = document.querySelector(".hero"),
openBtn = document.getElementById("openBtn"),
openingScreen = document.getElementById("openingScreen"),
transitionScreen = document.getElementById("transitionScreen"),
transitionVideo = document.getElementById("transitionVideo"),
audio = document.getElementById("bgMusic"),
navDock = document.getElementById("navDock"),
dockBubble = document.getElementById("dockBubble"),
navLinks = document.querySelectorAll(".dock a"),
elDays = document.getElementById("dDays"),
elHours = document.getElementById("dHours"),
elMins = document.getElementById("dMins"),
elSecs = document.getElementById("dSecs"),
lb = document.getElementById("lightbox"),
lbTrack = document.getElementById("lbTrack"),
lbClose = document.getElementById("lbClose"),
thumbs = Array.from(document.querySelectorAll(".thumb"));

let musicStarted = false;
let scrollY = 0;
let hasOpenedInvitation = false;

const thumbImages = thumbs.map(btn => btn.dataset.full);

function buildLightbox(){
  lbTrack.innerHTML="";
  thumbImages.forEach(src=>{
    const img=document.createElement("img");
    img.alt="Gallery image";
    img.dataset.src=src;
    lbTrack.appendChild(img);
  });
}

function loadLightboxImage(index){
  const imgs=lbTrack.querySelectorAll("img");
  const current=imgs[index];
  const prev=imgs[index-1];
  const next=imgs[index+1];

  [current,prev,next].forEach(img=>{
    if(img && !img.src){
      img.src=img.dataset.src;
    }
  });
}

buildLightbox();

function lockScroll(){
  scrollY=window.pageYOffset||document.documentElement.scrollTop;
  document.body.style.cssText=`position:fixed;top:${-scrollY}px;width:100%;overflow:hidden`;
  document.documentElement.style.overflow='hidden';
}

function unlockScroll(){
  document.body.style.cssText='';
  document.documentElement.style.overflow='';
  window.scrollTo(0,scrollY);
}

let lbCurrentIndex=0;
let isDragging=false;
let startX=0;
let lbWidth=0;
let startTime=0;

function updateTrackPosition(smooth=true){
  lbTrack.style.transition=smooth?'transform .35s cubic-bezier(.25,1,.3,1)':'none';
  lbTrack.style.transform=`translateX(-${lbCurrentIndex*100}%)`;
  loadLightboxImage(lbCurrentIndex);
}

function openLb(index){
  lbCurrentIndex=index;
  loadLightboxImage(index);
  lb.classList.add("is-open");
  navDock.classList.remove("is-visible");
  lockScroll();
  updateTrackPosition(false);
}

function closeLb(){
  lb.classList.remove("is-open");
  if(hasOpenedInvitation) navDock.classList.add("is-visible");
  unlockScroll();
}

lb.addEventListener('touchstart',e=>{
  if(!lb.classList.contains('is-open'))return;
  isDragging=true;
  startX=e.touches[0].clientX;
  lbWidth=lb.offsetWidth;
  startTime=Date.now();
  lbTrack.style.transition='none';
},{passive:true});

lb.addEventListener('touchmove',e=>{
  if(!isDragging)return;

  const currentX=e.touches[0].clientX;
  const diff=currentX-startX;

  let dragOffset=diff;

  if(lbCurrentIndex===0 && diff>0){
    dragOffset=diff*.3;
  }else if(lbCurrentIndex===thumbImages.length-1 && diff<0){
    dragOffset=diff*.3;
  }

  lbTrack.style.transform=`translateX(calc(-${lbCurrentIndex*100}% + ${dragOffset}px))`;

},{passive:true});

lb.addEventListener('touchend',e=>{
  if(!isDragging)return;

  isDragging=false;

  const diff=e.changedTouches[0].clientX-startX;
  const time=Date.now()-startTime;
  const velocity=Math.abs(diff)/time;

  if(Math.abs(diff)>lbWidth*.06 || velocity>.5){

    if(diff>0 && lbCurrentIndex>0){
      lbCurrentIndex--;
    }else if(diff<0 && lbCurrentIndex<thumbImages.length-1){
      lbCurrentIndex++;
    }

  }

  updateTrackPosition(true);

},{passive:true});

lb.addEventListener('click',function(e){

  if(e.target===lb || e.target===lbTrack){
    closeLb();
    return;
  }

  if(e.target.tagName==="IMG"){
    const rect=e.target.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width;

    if(x<.3 && lbCurrentIndex>0){
      lbCurrentIndex--;
    }else if(x>.7 && lbCurrentIndex<thumbImages.length-1){
      lbCurrentIndex++;
    }

    updateTrackPosition(true);
  }

});

lbClose.onclick=e=>{
  e.stopPropagation();
  closeLb();
};

thumbs.forEach((btn,idx)=>btn.onclick=()=>openLb(idx));

function startMusicOnce(){
  if(musicStarted)return;
  musicStarted=true;
  audio.play().catch(()=>{});
}

function moveBubble(targetLink){

  const linkRect=targetLink.getBoundingClientRect();
  const dockRect=navDock.getBoundingClientRect();

  const leftPos=linkRect.left-dockRect.left;

  dockBubble.style.width=`${linkRect.width}px`;
  dockBubble.style.transform=`translateX(${leftPos}px)`;

  navLinks.forEach(link=>link.classList.remove("active"));
  targetLink.classList.add("active");

}

function tickCountdown(){

  const diff=new Date(EVENT.startLocalISO)-new Date();

  if(diff<=0){
    [elDays,elHours,elMins,elSecs].forEach(el=>el.textContent="0");
    return;
  }

  const sec=Math.floor(diff/1000);

  elDays.textContent=Math.floor(sec/86400);
  elHours.textContent=String(Math.floor((sec%86400)/3600)).padStart(2,"0");
  elMins.textContent=String(Math.floor((sec%3600)/60)).padStart(2,"0");
  elSecs.textContent=String(sec%60).padStart(2,"0");

}

function showMainContent(){

  if(hasOpenedInvitation)return;
  hasOpenedInvitation=true;

  transitionScreen.classList.remove("is-visible");

  heroSection.classList.add("hero-reveal");
  navDock.classList.add("is-visible");

  if(heroVideo){
    heroVideo.play().catch(()=>{});
  }

}

openBtn.onclick=async()=>{

  startMusicOnce();

  openingScreen.classList.add("is-leaving");

  setTimeout(async()=>{

    openingScreen.style.display="none";

    transitionScreen.classList.add("is-visible");

    transitionVideo.currentTime=0;

    try{
      await transitionVideo.play();
    }catch(err){
      showMainContent();
    }

  },700);

};

transitionVideo.addEventListener("ended",showMainContent);

transitionVideo.addEventListener("error",showMainContent);

document.addEventListener('click',e=>{

  const a=e.target.closest('a[href^="#"]');

  if(!a)return;

  e.preventDefault();

  document.querySelector(a.getAttribute("href"))?.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });

});

document.getElementById("btnCalendar").onclick=()=>{

  const start=new Date(EVENT.startLocalISO).toISOString().replace(/-|:|\.\d\d\d/g,"");
  const end=new Date(EVENT.endLocalISO).toISOString().replace(/-|:|\.\d\d\d/g,"");

  window.open(
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(EVENT.title)}&dates=${start}/${end}&details=${encodeURIComponent(EVENT.details)}&location=${encodeURIComponent(EVENT.locationName)}`,
"_blank"
  );

};

heroVideo.addEventListener("ended",()=>{
  heroVideo.currentTime=0.1;
  heroVideo.play();
});

tickCountdown();
setInterval(tickCountdown,1000);

});
</script>
