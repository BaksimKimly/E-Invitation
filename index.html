<!doctype html>
<html lang="en" class="scroll-lock">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>Baksim & Kimly • Invitation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#060606;
      --fg:#f3f3f3;
      --muted:rgba(255,255,255,.78);
      --card:rgba(0,0,0,.45);
      --border:rgba(255,255,255,.16);
      --shadow:0 14px 50px rgba(0,0,0,.58);
      --radius:18px;
      --gold-1:#6b4a1e;
      --gold-2:#f6e27a;
      --gold-3:#cfa34f;
      --gold-4:#fff1b0;
      --vh:1vh;
    }

    *{ box-sizing:border-box; }

    .scroll-lock{
      overflow:hidden !important;
      height:100svh !important;
      touch-action:none !important;
    }

    html, body{
      margin:0;
      padding:0;
      font-family:"Cormorant Garamond", serif;
      background:#080604 radial-gradient(circle at 50% 50%, #1c140a 0%, #060402 100%);
      color:var(--fg);
      overflow-x:hidden;
      scroll-behavior:smooth;
      -webkit-text-size-adjust:100%;
      width:100%;
      min-height:100svh;
    }

    body{
      position:relative;
    }

    .bg-wrap{
      position:fixed;
      top:0;
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:500px;
      height:100%;
      z-index:0;
      overflow:hidden;
      background:#050505;
      box-shadow:0 0 50px rgba(0,0,0,0.8);
      border-left:1px solid rgba(255,215,150,0.15);
      border-right:1px solid rgba(255,215,150,0.15);
    }

    .bg-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      z-index:1;
      filter:brightness(.92) contrast(1.08) saturate(1.12);
      opacity:1;
      transition:opacity .5s ease;
    }

    .fallback-bg{
      position:absolute;
      inset:0;
      z-index:0;
      background:
        radial-gradient(900px 650px at 50% 26%, rgba(255,221,160,.20), transparent 60%),
        radial-gradient(800px 520px at 12% 86%, rgba(255,190,90,.12), transparent 58%),
        radial-gradient(900px 650px at 86% 88%, rgba(255,225,170,.12), transparent 58%),
        linear-gradient(180deg, #0b0b0b, #040404);
    }

    .overlay{
      position:absolute;
      inset:0;
      z-index:2;
      background:
        radial-gradient(55% 45% at 50% 28%, rgba(255,220,150,.22), transparent 60%),
        radial-gradient(90% 80% at 50% 35%, rgba(0,0,0,.10), rgba(0,0,0,.72));
    }

    #openingScreen, .hero, .section, .dock, .lightbox{
      position:relative;
      z-index:3;
    }

    #fitViewport{
      position:relative;
      width:100%;
      max-width:500px;
      min-height:100svh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:0;
      z-index:3;
      margin:0 auto;
    }

    #fitRoot{
      position:relative;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    a, a:link, a:visited, a:hover, a:active{
      color:inherit;
      text-decoration:none !important;
      outline:none;
    }

    button{
      font:inherit;
      border:none;
      outline:none;
      background:none;
      -webkit-tap-highlight-color:transparent;
    }

    #openingScreen{
      position:fixed;
      inset:0;
      margin:0 auto;
      width:100%;
      max-width:500px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
      opacity:1;
      overflow:hidden;
      background:transparent;
      min-height:calc(var(--vh) * 100);
      padding:20px 10px;
      transition:opacity .85s ease, visibility .85s ease;
      visibility:visible;
    }

    #openingScreen.is-leaving{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .opening-glass{
      position:absolute;
      inset:0;
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      background:rgba(0,0,0,.14);
    }

    .opening-overlay{
      position:absolute;
      inset:0;
      background:radial-gradient(70% 60% at 50% 30%, rgba(255,220,150,.05), rgba(0,0,0,.26));
      pointer-events:none;
    }

    .open-box{
      text-align:center;
      color:white;
      width:100%;
      max-width:440px;
      z-index:2;
      animation:openPop .9s ease both;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:0;
      transition:transform .85s cubic-bezier(.22,1,.36,1), opacity .65s ease;
    }

    #openingScreen.is-leaving .open-box{
      transform:translateY(-10px);
      opacity:0;
    }

    .open-sub{
      font-family:"Great Vibes", cursive;
      font-size:clamp(24px, 6vw, 34px);
      line-height:1.2;
      letter-spacing:.02em;
      margin:0;
      padding:0 12px;
      background:linear-gradient(90deg, var(--gold-1) 0%, var(--gold-2) 18%, var(--gold-3) 35%, var(--gold-4) 50%, var(--gold-3) 65%, var(--gold-2) 82%, var(--gold-1) 100%);
      background-size:240% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:goldShift 4.5s ease-in-out infinite;
    }

    .open-logo-wrap{
      position:relative;
      display:inline-block;
      width:100%;
      max-width:420px;
      line-height:0;
      margin:35px 0;
      animation:logoFloat 3.8s ease-in-out infinite;
    }

    .open-logo{
      width:100%;
      height:auto;
      object-fit:contain;
      user-select:none;
      filter:drop-shadow(0 18px 40px rgba(0,0,0,.55)) drop-shadow(0 0 8px rgba(255,241,176,.10)) drop-shadow(0 0 16px rgba(207,163,79,.08));
      animation:logoGoldGlow 4.5s ease-in-out infinite;
    }

    .open-btn--lux{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 24px;
      min-width:190px;
      border-radius:16px;
      border:1px solid rgba(255,235,190,.40);
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(20,18,14,.34), rgba(8,8,8,.22));
      box-shadow:0 10px 26px rgba(0,0,0,.30);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      cursor:pointer;
      overflow:hidden;
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
    }

    .open-btn--lux:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 30px rgba(0,0,0,.34);
      border-color:rgba(255,235,190,.55);
    }

    .open-btn__label{
      position:relative;
      z-index:1;
      font-size:clamp(16px, 4vw, 20px);
      line-height:1;
      letter-spacing:.08em;
      font-weight:500;
      white-space:nowrap;
      padding:0 4px;
      background:linear-gradient(90deg, var(--gold-1) 0%, var(--gold-2) 18%, var(--gold-3) 35%, var(--gold-4) 50%, var(--gold-3) 65%, var(--gold-2) 82%, var(--gold-1) 100%);
      background-size:240% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:goldShift 4.5s ease-in-out infinite;
      text-shadow:0 0 10px rgba(255,220,150,.08);
    }

    .hero, .section{
      width:100%;
      min-height:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 15px 28px 15px;
      scroll-margin-top:20px;
    }

    #gallery.section {
      padding-left: 0;
      padding-right: 0;
      padding-top: 20px;
      padding-bottom: 20px;
    }

    .hero{
      min-height:calc(var(--vh) * 100);
      opacity:0;
    }

    .hero.hero-reveal{
      animation:heroReveal 1.1s cubic-bezier(.22,1,.36,1) forwards;
    }

    .content{
      width:100%;
      max-width:440px;
      text-align:center;
      padding:24px 15px;
      border-radius:var(--radius);
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      overflow:visible !important;
      margin:0 auto;
    }

    .hero .content,
    #location .content,
    #wishes .content{
      background:rgba(0,0,0,.20);
      border-color:rgba(255,255,255,.18);
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);
    }

    .hero .content{
      animation:heroCardRise 1s cubic-bezier(.22,1,.36,1) both;
      animation-delay:.1s;
    }

    #location.section {
      padding-top:20px;
      padding-bottom:20px;
    }

    #wishes.section {
      padding-top:20px;
      padding-bottom: max(120px, calc(env(safe-area-inset-bottom) + 90px));
    }

    #location .content,
    #wishes .content{
      margin-top:0;
      margin-bottom:0;
    }

    #gallery .content {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      max-width: 100% !important; 
      padding: 10px 5px !important; 
      margin-top: 0;
      margin-bottom: 0;
    }

    #event .event-content{
      background:transparent;
      border:none;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
      padding:24px 0;
      max-width:440px;
    }

    #event .section-title{
      margin:0 0 14px;
    }

    .divider{
      height:1px;
      background:rgba(255,255,255,.14
